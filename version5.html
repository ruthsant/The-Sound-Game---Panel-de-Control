<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SOUND GAME - Clasificación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sq-pink: #ff0b55;
            --sq-green: #037a76;
            --sq-gold: #ffcc00;
            --sq-dark: #050505;
        }

        body {
            background-color: var(--sq-dark);
            color: #eee;
            font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .terminal-font { font-family: 'VT323', monospace; }

        /* Símbolos */
        .symbol { display: inline-block; border: 2px solid currentColor; margin-right: 8px; vertical-align: middle; }
        .s-circle { width: 14px; height: 14px; border-radius: 50%; }
        .s-triangle { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 14px solid currentColor; border-top: 0; background: none; }
        .s-square { width: 14px; height: 14px; }

        /* Hucha Cerdito */
        .piggy-bank {
            width: 100px; height: 80px;
            background: var(--sq-gold);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 20px rgba(255, 204, 0, 0.2);
            transition: transform 0.2s;
        }
        .piggy-bank::after { content: ''; position: absolute; top: 35px; right: -5px; width: 15px; height: 25px; background: #d4a017; border-radius: 50%; }
        
        .coin-animation {
            position: absolute; top: -20px; left: 50%; width: 12px; height: 12px;
            background: gold; border-radius: 50%; animation: drop 0.5s forwards;
        }
        @keyframes drop { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(40px); opacity: 0; } }

        /* Tabla de Clasificación */
        .sq-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .sq-row { background: rgba(255,255,255,0.03); transition: all 0.2s; border-left: 4px solid transparent; }
        .sq-row:hover { background: rgba(255,255,255,0.07); transform: translateX(5px); }
        .row-alive { border-left-color: var(--sq-green); }
        .row-dead { border-left-color: var(--sq-pink); opacity: 0.5; filter: grayscale(1); }

        .btn-action {
            width: 30px; height: 30px; background: #222; display: flex; align-items: center; justify-content: center;
            border: 1px solid #444; font-family: 'VT323'; transition: 0.2s;
        }
        .btn-action:hover { background: var(--sq-pink); border-color: var(--sq-pink); }

        .status-badge { font-family: 'VT323'; padding: 2px 8px; border-radius: 2px; font-size: 14px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-zinc-800 pb-8 gap-6">
            <div class="flex items-center gap-5">
                <div class="p-4 bg-white text-black"><div class="s-square border-black scale-150"></div></div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter terminal-font">THE SOUND GAME // CLASIFICACIÓN</h1>
                    <p class="text-xs text-zinc-500 tracking-[0.3em] uppercase mt-1">Status: Monitoreo de Sujetos Activo</p>
                </div>
            </div>

            <!-- CERDITO -->
            <div class="flex items-center gap-6 bg-zinc-900/50 p-4 border border-zinc-800 rounded">
                <div class="relative" id="piggy-box">
                    <div class="piggy-bank" id="piggy"></div>
                    <div id="coin-container"></div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-zinc-500 uppercase block">Bote Acumulado</span>
                    <span id="total-jackpot" class="text-4xl text-yellow-500 font-bold terminal-font">0€</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- PANEL DE CONTROL -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-zinc-900/80 p-6 border-t-2 border-pink-600">
                    <h2 class="terminal-font text-xl text-pink-500 mb-6 flex items-center">
                        <span class="s-triangle border-b-pink-500 mr-2"></span> REGISTRO
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="new-id" placeholder="ID (Ej: 456)" class="w-full bg-black border border-zinc-700 p-3 terminal-font text-xl text-white outline-none focus:border-pink-500">
                        <button onclick="addUser()" class="w-full bg-pink-600 p-3 font-bold uppercase tracking-widest hover:bg-pink-500 transition-all">RECLUTAR</button>
                    </div>
                </div>

                <div class="bg-zinc-900/30 p-4 border border-zinc-800 text-[10px] text-zinc-600 terminal-font space-y-2">
                    <div class="flex justify-between"><span>Vivos:</span><span id="count-alive" class="text-green-500">0</span></div>
                    <div class="flex justify-between"><span>Eliminados:</span><span id="count-dead" class="text-pink-500">0</span></div>
                    <button onclick="resetData()" class="w-full mt-4 border border-zinc-800 p-2 hover:bg-red-900/20">RESETEAR SISTEMA</button>
                </div>
            </div>

            <!-- LEADERBOARD -->
            <div class="lg:col-span-3">
                <div class="bg-zinc-900/20 p-6 border border-zinc-800 min-h-[400px]">
                    <div class="flex items-center mb-6 text-zinc-400">
                        <span class="s-circle border-zinc-400 mr-2"></span>
                        <h2 class="terminal-font text-xl uppercase">Monitor de Supervivencia</h2>
                    </div>

                    <table class="sq-table">
                        <thead class="text-[10px] text-zinc-500 uppercase terminal-font">
                            <tr>
                                <th class="text-left pb-4 pl-4">Jugador</th>
                                <th class="text-center pb-4">Energía (Vidas)</th>
                                <th class="text-center pb-4">Sanciones</th>
                                <th class="text-right pb-4 pr-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="player-list">
                            <!-- JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('tsg_v2')) || { players: [], jackpot: 0 };

        function updateUI() {
            const list = document.getElementById('player-list');
            const jackpot = document.getElementById('total-jackpot');
            const aliveCount = document.getElementById('count-alive');
            const deadCount = document.getElementById('count-dead');

            jackpot.innerText = state.jackpot.toLocaleString() + '€';
            
            const alive = state.players.filter(p => p.lives > 0);
            const dead = state.players.filter(p => p.lives === 0);
            
            aliveCount.innerText = alive.length;
            deadCount.innerText = dead.length;

            list.innerHTML = '';

            // Ordenar: Vivos arriba, luego por ID
            const sorted = [...state.players].sort((a,b) => {
                if (a.lives > 0 && b.lives === 0) return -1;
                if (a.lives === 0 && b.lives > 0) return 1;
                return a.id.localeCompare(b.id);
            });

            sorted.forEach(p => {
                const isDead = p.lives === 0;
                const tr = document.createElement('tr');
                tr.className = `sq-row ${isDead ? 'row-dead' : 'row-alive'}`;

                const hearts = isDead ? '<span class="text-red-600">ELIMINADO</span>' : '▮'.repeat(p.lives).padEnd(5, '▯');

                tr.innerHTML = `
                    <td class="py-4 pl-4">
                        <div class="flex flex-col">
                            <span class="terminal-font text-2xl font-bold">#${p.id}</span>
                            <span class="text-[9px] text-zinc-500 uppercase">Sujeto_Identificado</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="terminal-font text-xl ${p.lives === 1 ? 'animate-pulse text-pink-500' : ''}">${hearts}</div>
                    </td>
                    <td class="text-center terminal-font text-pink-500 text-lg">
                        ${p.fines}
                    </td>
                    <td class="py-4 pr-4">
                        <div class="flex justify-end gap-2">
                            <button onclick="modLife('${p.id}', 1)" class="btn-action">+</button>
                            <button onclick="modLife('${p.id}', -1)" class="btn-action">-</button>
                        </div>
                    </td>
                `;
                list.appendChild(tr);
            });

            localStorage.setItem('tsg_v2', JSON.stringify(state));
        }

        function addUser() {
            const input = document.getElementById('new-id');
            const id = input.value.trim();
            if(!id || state.players.find(p => p.id === id)) return;

            state.players.push({ id, lives: 3, fines: 0 });
            input.value = '';
            updateUI();
        }

        function modLife(id, delta) {
            const p = state.players.find(x => x.id === id);
            if(!p) return;

            p.lives = Math.max(0, Math.min(5, p.lives + delta));

            if(delta < 0) {
                dropCoin();
                p.fines++;
                state.jackpot += 1000;
                if(p.lives === 0) state.jackpot += 5000;
            }
            updateUI();
        }

        function dropCoin() {
            const container = document.getElementById('coin-container');
            const coin = document.createElement('div');
            coin.className = 'coin-animation';
            container.appendChild(coin);
            
            const p = document.getElementById('piggy');
            p.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                coin.remove();
                p.style.transform = 'scale(1)';
            }, 500);
        }

        function resetData() {
            if(confirm("¿Purgar todos los registros?")) {
                state = { players: [], jackpot: 0 };
                updateUI();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
